version: '3.8'

services:
  mcp-server:
    build: .
    command: uv run python -c "from src.server import run_server; run_server(transport='streamable-http')"
    restart: always
    ports:
      - "8082:8082"
    volumes:
      - .:/app
      - mcp-storage:/app/storage
    environment:
      - SCENE_WS_BASE_URL=ws://ue-server:8889
      - DATA_API_MOCK_ENABLED=true
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mcp-network:
    driver: bridge

volumes:
  mcp-storage:
    driver: local
